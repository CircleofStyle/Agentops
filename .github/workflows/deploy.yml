name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

      # Vercel Git integration deploys on push. This job verifies production health.
      - name: Post-deploy health check
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${PRODUCTION_URL}" ]; then
            echo "PRODUCTION_URL secret not set — skipping health gate."
            echo "Set PRODUCTION_URL in GitHub Actions secrets (e.g. https://agentops.vercel.app)"
            exit 0
          fi
          BASE="${PRODUCTION_URL%/}"
          CURL_OPTS=(-fsS)
          if [ -n "${VERCEL_AUTOMATION_BYPASS_SECRET}" ]; then
            CURL_OPTS+=(-H "x-vercel-protection-bypass: ${VERCEL_AUTOMATION_BYPASS_SECRET}")
          fi
          echo "Checking health at ${BASE}/api/health"
          for attempt in $(seq 1 12); do
            if response=$(curl "${CURL_OPTS[@]}" "${BASE}/api/health"); then
              echo "$response"
              if echo "$response" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
                echo "Health check passed on attempt ${attempt}"
                exit 0
              fi
            fi
            echo "Attempt ${attempt}/12 failed; retrying in 10s..."
            sleep 10
          done
          echo "Health check failed — if you see 401, disable Vercel Deployment Protection or set VERCEL_AUTOMATION_BYPASS_SECRET"
          exit 1
